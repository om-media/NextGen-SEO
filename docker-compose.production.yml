x-app-common: &app-common
  build:
    context: .
  image: gscplus-app:${GSCPLUS_IMAGE_TAG:-local}
  env_file:
    - path: .env.production
      required: false
  environment:
    DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
    INTERNAL_LINK_EMBEDDING_WORKER_URL: http://embedding-worker:8091
    NODE_ENV: production
    POSTGRES_SSL: ${POSTGRES_SSL:-false}
  depends_on:
    database-prepare:
      condition: service_completed_successfully
  restart: unless-stopped
  volumes:
    - uploads-production-data:/app/uploads

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gscplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-gscplus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gscplus} -d ${POSTGRES_DB:-gscplus}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    shm_size: 1gb
    volumes:
      - postgres-production-data:/var/lib/postgresql/data

  database-prepare:
    build:
      context: .
    image: gscplus-app:${GSCPLUS_IMAGE_TAG:-local}
    command: ["npm", "run", "db:prepare"]
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${PREPARE_POSTGRES_POOL_MAX:-4}
      RUN_DATABASE_BACKFILLS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  embedding-worker:
    build:
      context: ./services/embedding-worker
    environment:
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_CPU_THREADS: ${EMBEDDING_CPU_THREADS:-8}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_MAX_BATCH_SIZE: ${EMBEDDING_MAX_BATCH_SIZE:-128}
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_MODEL_CACHE: /models
      EMBEDDING_MAX_QUEUE_REQUESTS: ${EMBEDDING_MAX_QUEUE_REQUESTS:-128}
      EMBEDDING_MAX_QUEUE_TEXTS: ${EMBEDDING_MAX_QUEUE_TEXTS:-4096}
      EMBEDDING_QUEUE_TIMEOUT_MS: ${EMBEDDING_QUEUE_TIMEOUT_MS:-300000}
    expose:
      - "8091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health/ready', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 40
      start_period: 15m
    restart: unless-stopped
    volumes:
      - bge-m3-production-cache:/models

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro

  web:
    <<: *app-common
    command: ["npm", "run", "start:web"]
    environment:
      APP_PROCESS_ROLE: web
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      INTERNAL_LINK_EMBEDDING_WORKER_URL: http://embedding-worker:8091
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${WEB_POSTGRES_POOL_MAX:-15}
      START_BACKGROUND_WORKERS: "false"
      RUN_DATABASE_BACKFILLS: "false"
    deploy:
      replicas: ${WEB_REPLICAS:-2}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  crawl-worker:
    <<: *app-common
    command: ["npm", "run", "start:worker:crawl"]
    environment:
      CRAWL_JOB_CONCURRENCY: ${CRAWL_JOB_CONCURRENCY:-2}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      INTERNAL_LINK_EMBEDDING_WORKER_URL: http://embedding-worker:8091
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${CRAWL_POSTGRES_POOL_MAX:-8}
      WORKER_HEALTH_PORT: "3101"
      RUN_DATABASE_BACKFILLS: "false"
    expose:
      - "3101"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3101/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  internal-links-worker:
    <<: *app-common
    command: ["npm", "run", "start:worker:internal-links"]
    depends_on:
      embedding-worker:
        condition: service_healthy
      database-prepare:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      INTERNAL_LINK_EMBEDDING_WORKER_URL: http://embedding-worker:8091
      INTERNAL_LINK_JOB_CONCURRENCY: ${INTERNAL_LINK_JOB_CONCURRENCY:-2}
      INTERNAL_LINK_LOCK_TIMEOUT_MS: ${INTERNAL_LINK_LOCK_TIMEOUT_MS:-600000}
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${INTERNAL_LINK_POSTGRES_POOL_MAX:-10}
      RUN_DATABASE_BACKFILLS: "false"
      WORKER_HEALTH_PORT: "3102"
    expose:
      - "3102"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3102/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  warehouse-worker:
    <<: *app-common
    command: ["npm", "run", "start:worker:warehouse"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${WAREHOUSE_POSTGRES_POOL_MAX:-8}
      WORKER_HEALTH_PORT: "3103"
      RUN_DATABASE_BACKFILLS: "false"
    expose:
      - "3103"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3103/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  scheduler:
    <<: *app-common
    command: ["npm", "run", "start:scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      NODE_ENV: production
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      POSTGRES_POOL_MAX: ${SCHEDULER_POSTGRES_POOL_MAX:-4}
      WORKER_HEALTH_PORT: "3104"
      RUN_DATABASE_BACKFILLS: "false"
    expose:
      - "3104"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3104/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  bge-m3-production-cache:
  postgres-production-data:
  uploads-production-data: